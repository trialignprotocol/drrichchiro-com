name: Publish preview

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: preview-drrichchiro
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          path: src

      - name: Check out the preview site
        uses: actions/checkout@v4
        with:
          repository: trialignprotocol/site-previews
          ssh-key: ${{ secrets.PREVIEW_DEPLOY_KEY }}
          path: previews

      - name: Sync dev into the preview folder
        run: |
          set -euo pipefail
          rm -rf "previews/drrichchiro"
          mkdir -p "previews/drrichchiro"
          rsync -a --exclude '.git' --exclude '.github' --exclude 'CNAME' src/ "previews/drrichchiro/"
          # Site is served from a subpath here, so root-absolute links must be relative.
          find "previews/drrichchiro" -name '*.html' -exec sed -i 's|href="/"|href="./"|g' {} +
          # A preview must never bind the live domain and must never be indexed.
          printf 'User-agent: *\nDisallow: /\n' > "previews/drrichchiro/robots.txt"

      - name: Commit the preview
        working-directory: previews
        run: |
          set -euo pipefail
          git config user.name "preview-bot"
          git config user.email "preview-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Preview already up to date."
            exit 0
          fi
          git commit -m "Preview drrichchiro @ ${{ github.sha }}"
          git push
